name: Import Auto-Company upstream

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/import-auto-company.yml
      - .github/import-auto-company.sh
  pull_request:
    branches:
      - main
    paths:
      - .github/import-trigger
  workflow_dispatch: {}

permissions:
  contents: write
  actions: read

concurrency:
  group: import-auto-company-upstream
  cancel-in-progress: false

jobs:
  import:
    name: Import exact upstream tree
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      SOURCE_REPOSITORY: MaxMiksa/Auto-Company
      SOURCE_URL: https://github.com/MaxMiksa/Auto-Company.git
      SOURCE_BRANCH: main
      SOURCE_SHA: ebfab9b4bd5f0ab5ad452a1ff85285b3c141acdd
      IMPORT_BRANCH: agent/import-auto-company
    steps:
      - name: Checkout destination main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: true
          show-progress: false

      - name: Import and verify the complete upstream tree
        shell: bash
        run: bash .github/import-auto-company.sh

  validate:
    name: Validate imported application
    needs: import
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Checkout imported branch without credentials
        uses: actions/checkout@v4
        with:
          ref: agent/import-auto-company
          persist-credentials: false
          fetch-depth: 1
          show-progress: false

      - name: Validate Python syntax
        shell: bash
        run: python3 -m py_compile dashboard/server.py tests/test_dashboard_server.py

      - name: Validate JavaScript syntax
        shell: bash
        run: node --check dashboard/app.js

      - name: Validate shell syntax
        shell: bash
        run: |
          set -euo pipefail
          while IFS= read -r -d '' file; do
            bash -n "$file"
          done < <(find scripts -type f -name '*.sh' -print0)

      - name: Validate PowerShell syntax
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          Get-ChildItem -Path scripts/windows -Filter *.ps1 -File | ForEach-Object {
            $tokens = $null
            $errors = $null
            [System.Management.Automation.Language.Parser]::ParseFile($_.FullName, [ref]$tokens, [ref]$errors) | Out-Null
            if ($errors.Count -gt 0) {
              $errors | ForEach-Object { Write-Error $_.Message }
              throw "PowerShell parse validation failed for $($_.FullName)"
            }
          }

      - name: Run dashboard unit tests
        shell: bash
        run: python3 -m unittest discover -s tests -v
