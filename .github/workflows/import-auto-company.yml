name: Import Auto-Company upstream

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/import-auto-company.yml
  pull_request:
    branches: [main]
    paths: [.github/import-trigger]
  workflow_dispatch: {}

permissions:
  contents: write
  actions: read

concurrency:
  group: import-auto-company-upstream
  cancel-in-progress: false

jobs:
  import:
    name: Import exact upstream tree
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      SOURCE_SHA: ebfab9b4bd5f0ab5ad452a1ff85285b3c141acdd
      IMPORT_BRANCH: agent/import-auto-company
      DEFERRED_WORKFLOW: .github/workflows/ar-collections-finance-gate.yml
      DESTINATION_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Import and verify complete tree
        shell: bash
        run: |
          set -Eeuo pipefail
          exec > >(tee /tmp/auto-company-import.log) 2>&1
          trap 's=$?; echo "FAILED line=$LINENO status=$s"; exit $s' ERR
          git init -q .
          git config user.name 'github-actions[bot]]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git remote add origin "https://x-access-token:${DESTINATION_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git fetch -q --no-tags origin main
          base_sha="$(git rev-parse FETCH_HEAD)"
          git remote add upstream https://github.com/MaxMiksa/Auto-Company.git
          git fetch -q --no-tags --depth=1 upstream main
          fetched_sha="$(git rev-parse FETCH_HEAD)"
          echo "fetched_source_sha=$fetched_sha"
          test "$fetched_sha" = "$SOURCE_SHA"
          source_tree="$(git rev-parse "$SOURCE_SHA^{tree}")"
          source_count="$(git ls-tree -r --name-only "$SOURCE_SHA" | wc -l | tr -d ' ')"
          git cat-file -e "$SOURCE_SHA:$DEFERRED_WORKFLOW"
          deferred_workflow_blob="$(git rev-parse "$SOURCE_SHA:$DEFERRED_WORKFLOW")"
          git checkout -q -B "$IMPORT_BRANCH" "$base_sha"
          git read-tree --reset -u "$SOURCE_SHA"
          printf '%s\n' '# Import provenance' '' 'This repository contains a complete tree import from the upstream project.' '' '- Source repository: https://github.com/MaxMiksa/Auto-Company' '- Source branch: `main`' "- Source commit: \`$SOURCE_SHA\`" "- Source tree: \`$source_tree\`" "- Deferred workflow blob: \`$deferred_workflow_blob\`" '- Imported by: GitHub Actions and the connected GitHub app' '- Import date: 2026-07-22' '' 'The complete upstream tree was verified before the workflow file was deferred for an app-authorized write. IMPORT_SOURCE.md is the only destination-specific addition.' > IMPORT_SOURCE.md
          git add IMPORT_SOURCE.md
          imported_count="$(git ls-files | grep -v '^IMPORT_SOURCE.md$' | wc -l | tr -d ' ')"
          echo "source_files=$source_count imported_source_files=$imported_count"
          test "$source_count" = "$imported_count"
          git rm --cached -q IMPORT_SOURCE.md
          imported_tree="$(git write-tree)"
          git add IMPORT_SOURCE.md
          echo "source_tree=$source_tree imported_source_tree=$imported_tree"
          test "$source_tree" = "$imported_tree"
          git rm -q -f "$DEFERRED_WORKFLOW"
          echo "deferred_workflow=$DEFERRED_WORKFLOW blob=$deferred_workflow_blob"
          git commit -q -m "import: transfer Auto-Company at $SOURCE_SHA"
          git push -q --force origin "HEAD:refs/heads/$IMPORT_BRANCH"
          echo "SUCCESS branch=$IMPORT_BRANCH commit=$(git rev-parse HEAD)"

      - name: Upload import diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: auto-company-import-diagnostics-${{ github.run_id }}
          path: /tmp/auto-company-import.log
          if-no-files-found: warn
          retention-days: 7

  validate:
    name: Validate imported application
    needs: import
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Checkout imported branch
        uses: actions/checkout@v4
        with:
          ref: agent/import-auto-company
          persist-credentials: false
          fetch-depth: 1
          show-progress: false
      - name: Validate Python syntax
        run: python3 -m py_compile dashboard/server.py tests/test_dashboard_server.py
      - name: Validate JavaScript syntax
        run: node --check dashboard/app.js
      - name: Validate shell syntax
        run: find scripts -type f -name '*.sh' -print0 | xargs -0 -n1 bash -n
      - name: Validate PowerShell syntax
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          Get-ChildItem scripts/windows -Filter *.ps1 -File | ForEach-Object {
            $tokens = $null; $errors = $null
            [System.Management.Automation.Language.Parser]::ParseFile($_.FullName, [ref]$tokens, [ref]$errors) | Out-Null
            if ($errors.Count -gt 0) { $errors | ForEach-Object { Write-Error $_.Message }; throw "PowerShell parse validation failed for $($_.FullName)" }
          }
      - name: Run dashboard unit tests
        run: python3 -m unittest discover -s tests -v
